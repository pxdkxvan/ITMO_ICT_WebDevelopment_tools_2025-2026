site_name: Personal Finance API - Lab Report
site_description: Technical documentation for ITMO Web Development lab
site_author: Alekseev Andrey
site_url: https://pxdkxvan.github.io/ITMO_ICT_WebDevelopment_tools_2025-2026/
repo_url: https://github.com/pxdkxvan/ITMO_ICT_WebDevelopment_tools_2025-2026
repo_name: pxdkxvan/ITMO_ICT_WebDevelopment_tools_2025-2026
edit_uri: blob/main/students/K3341/Alekseev_Andrey/lr_1/docs/

theme:
  name: material
  language: ru
  logo: assets/logo.svg
  favicon: assets/logo.svg
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-night
        name: Темная тема
    - scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Светлая тема
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Главная: index.md
  - Финальный отчет: final_report.md
  - Архитектура: 01_architecture.md
  - База данных: 02_database.md
  - HTTP API: 03_http_api.md
  - Бизнес-логика и сценарии: 04_business_flows.md
  - Навигация по изменениям: 05_change_navigation.md
